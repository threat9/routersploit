name: Dependency Intelligence

on:
  pull_request:
    paths:
      - 'requirements*.txt'
      - 'pyproject.toml'

permissions:
  contents: read
  pull-requests: write

jobs:
  depintel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: DepIntel — scan dependencies
        uses: lunacompsia-oss/depintel-action@v1
        with:
          fail-on-critical: true
